<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PDF Locker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
  <style>
    .tab { cursor: pointer; }
    .tab-active { border-bottom: 3px solid #3b82f6; font-weight: 600; }
    .drop-zone {
      border: 2px dashed #cbd5e1;
      border-radius: 0.75rem;
      padding: 2rem;
      text-align: center;
      transition: all 0.2s;
      background-color: #f9fafb;
    }
    .drop-zone.dragover {
      border-color: #3b82f6;
      background-color: #eff6ff;
    }
  </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">
  <div class="bg-white shadow-2xl rounded-2xl w-full max-w-3xl p-6">
    <h1 class="text-2xl font-bold text-center mb-6">PDF Locker</h1>
    
    <!-- Tabs -->
    <div class="flex justify-around mb-6 border-b">
      <div id="tab-single" class="tab py-2 px-4 tab-active">Single Encrypt/Decrypt</div>
      <div id="tab-bulk" class="tab py-2 px-4">Bulk Encrypt</div>
    </div>

    <!-- Single Section -->
    <div id="section-single">
      <div class="mb-4">
        <div id="singleDropZone" class="drop-zone mb-2">
          <p class="text-gray-500">Drag & drop your PDF here, or click to select</p>
          <input type="file" id="singleFile" accept="application/pdf" class="hidden" />
        </div>
        <input type="password" id="singlePassword" placeholder="Enter password" class="border rounded w-full px-3 py-2 mb-2" />
        <select id="singleOperation" class="border rounded w-full px-3 py-2 mb-2">
          <option value="encrypt">Encrypt</option>
          <option value="decrypt">Decrypt</option>
        </select>
        <button id="singleSubmit" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-2 px-4 rounded-lg">Start</button>
      </div>
    </div>

    <!-- Bulk Section -->
    <div id="section-bulk" class="hidden">
      <div class="mb-4">
        <div id="bulkDropZone" class="drop-zone mb-2">
          <p class="text-gray-500">Drag & drop up to 100 PDFs here, or click to select</p>
          <input type="file" id="bulkFiles" accept="application/pdf" multiple class="hidden" />
        </div>
        <input type="password" id="bulkPassword" placeholder="Enter password" class="border rounded w-full px-3 py-2 mb-2" />
        <button id="bulkSubmit" class="w-full bg-green-600 hover:bg-green-700 text-white py-2 px-4 rounded-lg">Bulk Encrypt</button>
      </div>
    </div>
  </div>

  <script>
    const tabSingle = document.getElementById('tab-single');
    const tabBulk = document.getElementById('tab-bulk');
    const sectionSingle = document.getElementById('section-single');
    const sectionBulk = document.getElementById('section-bulk');

    // Tab switching
    tabSingle.addEventListener('click', () => {
      tabSingle.classList.add('tab-active');
      tabBulk.classList.remove('tab-active');
      sectionSingle.classList.remove('hidden');
      sectionBulk.classList.add('hidden');
    });
    tabBulk.addEventListener('click', () => {
      tabBulk.classList.add('tab-active');
      tabSingle.classList.remove('tab-active');
      sectionBulk.classList.remove('hidden');
      sectionSingle.classList.add('hidden');
    });

    // Helper toast function
    function showToast(msg, type="info") {
      let bg = "linear-gradient(to right, #3b82f6, #2563eb)";
      if(type === "error") bg = "linear-gradient(to right, #ef4444, #dc2626)";
      if(type === "success") bg = "linear-gradient(to right, #22c55e, #16a34a)";
      Toastify({
        text: msg,
        duration: 3000,
        gravity: "top",
        position: "right",
        backgroundColor: bg
      }).showToast();
    }

    // Drag & drop helper
    function setupDropZone(dropZone, fileInput, multiple = false) {
      dropZone.addEventListener('click', () => fileInput.click());

      dropZone.addEventListener('dragover', (e) => {
        e.preventDefault();
        dropZone.classList.add('dragover');
      });
      dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
      dropZone.addEventListener('drop', (e) => {
        e.preventDefault();
        dropZone.classList.remove('dragover');
        if(multiple) fileInput.files = e.dataTransfer.files;
        else fileInput.files = e.dataTransfer.files;
      });
    }

    setupDropZone(document.getElementById('singleDropZone'), document.getElementById('singleFile'));
    setupDropZone(document.getElementById('bulkDropZone'), document.getElementById('bulkFiles'), true);

    // Single submit
    document.getElementById('singleSubmit').addEventListener('click', async () => {
      const file = document.getElementById('singleFile').files[0];
      const password = document.getElementById('singlePassword').value;
      const operation = document.getElementById('singleOperation').value;

      if(!file) return showToast("Please select a PDF file.", "error");
      if(!password) return showToast("Please enter a password.", "error");

      const fd = new FormData();
      fd.append('test', file, file.name);

      try {
        const res = await fetch(`/api/v1/upload/${operation}`, {
          method: 'POST',
          headers: { 'x-password': password },
          body: fd
        });

        const contentType = res.headers.get('content-type');
        if(res.ok && contentType && contentType.includes('application/pdf')) {
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `${operation}-output.pdf`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showToast("PDF processed successfully!", "success");
        } else {
          const data = await res.json();
          showToast(data.messages || "Operation failed.", "error");
        }
      } catch(err) {
        showToast("Something went wrong.", "error");
      }
    });

    // Bulk submit
    document.getElementById('bulkSubmit').addEventListener('click', async () => {
      const files = document.getElementById('bulkFiles').files;
      const password = document.getElementById('bulkPassword').value;

      if(files.length === 0) return showToast("Please select PDF files.", "error");
      if(!password) return showToast("Please enter a password.", "error");
      if(files.length > 100) return showToast("Maximum 100 files allowed.", "error");

      const fd = new FormData();
      for(let f of files) {
        fd.append('test', f, f.name);
      }

      try {
        const res = await fetch(`/api/v1/upload/bulk/encrypt`, {
          method: 'POST',
          headers: { 'x-password': password },
          body: fd
        });

        const contentType = res.headers.get('content-type');
        if(res.ok && contentType && contentType.includes('application/zip')) {
          const blob = await res.blob();
          const url = window.URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = `bulk-encrypted.zip`;
          document.body.appendChild(a);
          a.click();
          a.remove();
          showToast("Bulk encryption successful!", "success");
        } else {
          const data = await res.json();
          showToast(data.messages || "Bulk encryption failed.", "error");
        }
      } catch(err) {
        showToast("Something went wrong.", "error");
      }
    });
  </script>
</body>
</html>
