<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Secure Pro - Encrypt & Decrypt PDFs</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Toastify CSS -->
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Custom CSS for animations and unique styling */
        body {
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }
        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
        }
        .btn {
            transition: all 0.3s ease;
        }
        .btn:hover {
            transform: scale(1.05);
        }
        .loading {
            animation: spin 1s linear infinite;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        /* Glassmorphism effect */
        .glass {
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            backdrop-filter: blur(5.5px);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.18);
        }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <header class="text-center mb-12">
        <h1 class="text-5xl font-bold mb-2">PDF Secure Pro</h1>
        <p class="text-xl opacity-80">Secure your PDFs with ease - Encrypt & Decrypt in seconds</p>
    </header>
    
    <main class="grid grid-cols-1 md:grid-cols-2 gap-8 w-full max-w-6xl">
        <!-- Encrypt Card -->
        <div class="card glass rounded-xl p-8">
            <h2 class="text-3xl font-semibold mb-6 flex items-center">
                <i class="fas fa-lock mr-3 text-green-400"></i> Encrypt PDF
            </h2>
            <form id="encryptForm" class="space-y-6">
                <div>
                    <label for="encryptFile" class="block text-lg mb-2">Upload Unlocked PDF</label>
                    <input type="file" id="encryptFile" accept=".pdf" class="w-full p-3 bg-transparent border border-white/30 rounded-lg text-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-white file:bg-blue-600 hover:file:bg-blue-700">
                </div>
                <div>
                    <label for="encryptPassword" class="block text-lg mb-2">Set Password</label>
                    <input type="password" id="encryptPassword" placeholder="Enter secure password" class="w-full p-3 bg-transparent border border-white/30 rounded-lg text-white placeholder-white/50">
                </div>
                <button type="submit" class="btn w-full py-3 bg-green-600 rounded-lg text-white font-bold hover:bg-green-700 flex items-center justify-center">
                    <i class="fas fa-upload mr-2"></i> Encrypt & Download
                </button>
            </form>
        </div>
        
        <!-- Decrypt Card -->
        <div class="card glass rounded-xl p-8">
            <h2 class="text-3xl font-semibold mb-6 flex items-center">
                <i class="fas fa-unlock mr-3 text-red-400"></i> Decrypt PDF
            </h2>
            <form id="decryptForm" class="space-y-6">
                <div>
                    <label for="decryptFile" class="block text-lg mb-2">Upload Locked PDF</label>
                    <input type="file" id="decryptFile" accept=".pdf" class="w-full p-3 bg-transparent border border-white/30 rounded-lg text-white file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-white file:bg-blue-600 hover:file:bg-blue-700">
                </div>
                <div>
                    <label for="decryptPassword" class="block text-lg mb-2">Enter Password</label>
                    <input type="password" id="decryptPassword" placeholder="Enter password to unlock" class="w-full p-3 bg-transparent border border-white/30 rounded-lg text-white placeholder-white/50">
                </div>
                <button type="submit" class="btn w-full py-3 bg-red-600 rounded-lg text-white font-bold hover:bg-red-700 flex items-center justify-center">
                    <i class="fas fa-download mr-2"></i> Decrypt & Download
                </button>
            </form>
        </div>
    </main>
    
    <footer class="mt-12 text-center opacity-60">
        <p>&copy; 2025 PDF Secure Pro. All rights reserved.</p>
    </footer>

    <!-- Toastify JS -->
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        // Helper function to show toast notifications
        function showToast(message, type = 'info') {
            let bgColor = type === 'success' ? '#00b09b' : type === 'error' ? '#ff5f6d' : '#2196f3';
            Toastify({
                text: message,
                duration: 5000,
                close: true,
                gravity: "top",
                position: "right",
                backgroundColor: `linear-gradient(to right, ${bgColor}, ${bgColor})`,
                stopOnFocus: true,
            }).showToast();
        }

        // Function to handle form submission
        async function handleSubmit(formId, endpoint) {
            const form = document.getElementById(formId);
            const fileInput = form.querySelector('input[type="file"]');
            const passwordInput = form.querySelector('input[type="password"]');
            const submitBtn = form.querySelector('button[type="submit"]');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const file = fileInput.files[0];
                const password = passwordInput.value;
                
                if (!file) {
                    showToast('Please select a PDF file.', 'error');
                    return;
                }
                if (!password) {
                    showToast('Please enter a password.', 'error');
                    return;
                }
                if (!file.name.endsWith('.pdf')) {
                    showToast('Only PDF files are allowed.', 'error');
                    return;
                }
                
                // Show loading state
                submitBtn.innerHTML = '<i class="fas fa-spinner loading mr-2"></i> Processing...';
                submitBtn.disabled = true;
                
                const formData = new FormData();
                formData.append('test', file); // Assuming multer field name is 'pdf', adjust if different
                
                try {
                    const response = await fetch(endpoint, {
                        method: 'POST',
                        headers: {
                            'x-password': password,
                        },
                        body: formData,
                    });
                    
                    const contentType = response.headers.get('content-type');
                    
                    if (contentType && contentType.includes('application/json')) {
                        // Error response (assuming backend sends JSON for errors)
                        const data = await response.json();
                        showToast(data.message || 'An error occurred.', 'error');
                        // Treat as 400-like error
                    } else if (contentType && contentType.includes('application/pdf')) {
                        // Success: Download the file
                        const blob = await response.blob();
                        const url = window.URL.createObjectURL(blob);
                        const a = document.createElement('a');
                        a.style.display = 'none';
                        a.href = url;
                        a.download = `${formId === 'encryptForm' ? 'encrypted' : 'decrypted'}_${file.name}`;
                        document.body.appendChild(a);
                        a.click();
                        window.URL.revokeObjectURL(url);
                        showToast('Operation successful! File downloaded.', 'success');
                    } else {
                        showToast('Unexpected response from server.', 'error');
                    }
                } catch (error) {
                    showToast('Network error: ' + error.message, 'error');
                } finally {
                    // Reset button
                    submitBtn.innerHTML = formId === 'encryptForm' 
                        ? '<i class="fas fa-upload mr-2"></i> Encrypt & Download'
                        : '<i class="fas fa-download mr-2"></i> Decrypt & Download';
                    submitBtn.disabled = false;
                }
            });
        }

        // Initialize forms
        handleSubmit('encryptForm', '/api/v1/upload/encrypt');
        handleSubmit('decryptForm', '/api/v1/upload/decrypt');
    </script>
</body>
</html>
